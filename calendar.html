<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar — Same Solutions LLC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #101820;
    color: #e5e5e5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  a { color: #FFB612; text-decoration: none; }
  a:hover { text-decoration: underline; }

  .top-links {
    width: 100%;
    max-width: 700px;
    padding: 16px 16px 0;
    font-size: 13px;
    display: flex;
    gap: 16px;
  }

  .cal-container {
    width: 100%;
    max-width: 700px;
    padding: 16px;
    flex: 1;
  }

  /* Header */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }
  .cal-nav {
    background: none;
    border: 1px solid #333;
    color: #FFB612;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cal-nav:hover { background: #1a2530; }

  /* Legend */
  .legend {
    display: flex;
    gap: 14px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    font-size: 12px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Grid */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .cal-dow {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: #888;
    padding: 6px 0;
    text-transform: uppercase;
  }
  .cal-cell {
    min-height: 80px;
    display: flex;
    flex-direction: column;
    border-radius: 6px;
    font-size: 13px;
    color: #555;
    position: relative;
    cursor: default;
    padding: 4px;
    background: #151f2a;
  }
  .cal-cell.current { color: #ccc; background: #1a2530; }
  .cal-cell.current:hover { background: #1f2d3d; }
  .cal-cell.has-event { cursor: pointer; }
  .cal-cell.today {
    border: 2px solid #FFB612;
    color: #fff;
    font-weight: 700;
  }
  .cal-cell.selected { background: #253545; }
  .cal-day-num {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .cell-events {
    display: flex;
    flex-direction: column;
    gap: 1px;
    overflow: hidden;
    flex: 1;
  }
  .cell-evt {
    font-size: 9px;
    line-height: 1.3;
    padding: 1px 3px;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #101820;
    font-weight: 600;
  }
  .cell-more {
    font-size: 9px;
    color: #888;
    margin-top: 1px;
  }

  /* Event panel */
  .event-panel {
    margin-top: 16px;
    background: #1a2530;
    border-radius: 10px;
    padding: 14px;
    display: none;
  }
  .event-panel.open { display: block; }
  .event-panel h2 {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 10px;
  }
  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 0;
  }
  .event-item + .event-item { border-top: 1px solid #263040; }
  .event-tag {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    color: #101820;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .event-text {
    font-size: 13px;
    line-height: 1.4;
  }

  /* Footer */
  .bottom-links {
    width: 100%;
    max-width: 700px;
    padding: 0 16px 8px;
    font-size: 13px;
    display: flex;
    gap: 16px;
  }
  .footer {
    width: 100%;
    max-width: 700px;
    padding: 8px 16px 24px;
    text-align: center;
    font-size: 11px;
    color: #555;
  }

  /* Mobile: single column list fallback */
  @media (max-width: 500px) {
    .cal-cell { min-height: 56px; padding: 3px; }
    .cell-evt { font-size: 8px; }
    .cal-day-num { font-size: 12px; }
    .cal-container { padding: 8px; }
  }
</style>
</head>
<body>

<div class="top-links">
  <a href="/manage">&larr; Back to app</a>
  <a href="https://github.com/SUGARDUNK3RTON/samesolutionsllc-website/blob/main/PLANNER.md">View full planner &rarr;</a>
</div>

<div class="cal-container">
  <div class="cal-header">
    <button class="cal-nav" id="prev-btn">&larr;</button>
    <h1 id="month-title"></h1>
    <button class="cal-nav" id="next-btn">&rarr;</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> Deadline</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FFB612"></div> Business</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> Personal</div>
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Completed</div>
  </div>

  <div class="cal-grid" id="cal-grid"></div>
  <div class="event-panel" id="event-panel">
    <h2 id="event-date"></h2>
    <div id="event-list"></div>
  </div>
</div>

<div class="bottom-links">
  <a href="/">&larr; Back to site</a>
</div>

<footer class="footer">Same Solutions LLC &bull; Updated via PLANNER.md</footer>

<script>
// Color categories: red = deadline, gold = business, blue = personal, green = completed
const CAT_COLORS = {
  deadline: '#e74c3c',
  biz:      '#FFB612',
  personal: '#3b82f6',
  done:     '#22c55e'
};

const EVENTS = [
  // April 2026
  // Thu 4/3
  { y:2026, m:3, d:3, text:'11 AM Therapy', cat:'personal' },
  { y:2026, m:3, d:3, text:'Call Tessman (248-535-4042)', cat:'biz' },
  { y:2026, m:3, d:3, text:'Call Insurance (800) 318-2596', cat:'biz' },
  { y:2026, m:3, d:3, text:'Research ladder for peak stain', cat:'biz' },
  { y:2026, m:3, d:3, text:'Send Haim SS-Q003', cat:'biz' },
  // Fri 4/4
  { y:2026, m:3, d:4, text:'Tax Prep (2-4 hrs)', cat:'biz' },
  { y:2026, m:3, d:4, text:'Finalize Ladder', cat:'biz' },
  { y:2026, m:3, d:4, text:'Finalize SW paint order', cat:'biz' },
  // Sat 4/5
  { y:2026, m:3, d:5, text:'Peak Stain SS-Q004 (weather)', cat:'biz' },
  { y:2026, m:3, d:5, text:'Place SW Bulk Order', cat:'biz' },
  // Sun 4/6
  { y:2026, m:3, d:6, text:'10 AM CeCe Arches (all day)', cat:'biz' },
  // Mon-Fri 4/7-11
  { y:2026, m:3, d:7, text:'Tessman Painting TBD', cat:'biz' },
  { y:2026, m:3, d:8, text:'Tessman Painting TBD', cat:'biz' },
  { y:2026, m:3, d:9, text:'Taxes Backup', cat:'biz' },
  // Thu 4/10 recurring therapy
  { y:2026, m:3, d:10, text:'11 AM Therapy', cat:'personal' },
  // Tue 4/15 TAX DEADLINE
  { y:2026, m:3, d:15, text:'TAX DEADLINE', cat:'deadline' },
  // Thu 4/17 recurring therapy
  { y:2026, m:3, d:17, text:'11 AM Therapy', cat:'personal' },
  // Thu 4/24 recurring therapy
  { y:2026, m:3, d:24, text:'11 AM Therapy', cat:'personal' },
  // Existing future events
  { y:2026, m:10, d:1, text:'Open enrollment 2027 starts', cat:'deadline' },
  { y:2026, m:11, d:15, text:'Open enrollment 2027 ends', cat:'deadline' },
];

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let viewYear = 2026, viewMonth = 3; // 0-indexed: 3 = April
let selectedKey = null;

function eventKey(y, m, d) { return y + '-' + m + '-' + d; }

function getEvents(y, m, d) {
  return EVENTS.filter(e => e.y === y && e.m === m && e.d === d);
}

function render() {
  document.getElementById('month-title').textContent = MONTHS[viewMonth] + ' ' + viewYear;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const today = new Date();

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    const evts = getEvents(viewYear, viewMonth, d);
    const isToday = today.getFullYear() === viewYear && today.getMonth() === viewMonth && today.getDate() === d;
    const key = eventKey(viewYear, viewMonth, d);

    let cls = 'cal-cell current';
    if (isToday) cls += ' today';
    if (evts.length) cls += ' has-event';
    if (selectedKey === key) cls += ' selected';
    el.className = cls;

    // Day number
    const dayNum = document.createElement('div');
    dayNum.className = 'cal-day-num';
    dayNum.textContent = d;
    el.appendChild(dayNum);

    // Show up to 3 mini event labels in cell
    if (evts.length) {
      const cellEvts = document.createElement('div');
      cellEvts.className = 'cell-events';
      const maxShow = 3;
      evts.slice(0, maxShow).forEach(evt => {
        const tag = document.createElement('div');
        tag.className = 'cell-evt';
        tag.style.background = CAT_COLORS[evt.cat] || '#888';
        tag.textContent = evt.text;
        cellEvts.appendChild(tag);
      });
      if (evts.length > maxShow) {
        const more = document.createElement('div');
        more.className = 'cell-more';
        more.textContent = '+' + (evts.length - maxShow) + ' more';
        cellEvts.appendChild(more);
      }
      el.appendChild(cellEvts);

      el.addEventListener('click', () => {
        selectedKey = selectedKey === key ? null : key;
        render();
        if (selectedKey) showEvents(viewYear, viewMonth, d, evts);
        else document.getElementById('event-panel').classList.remove('open');
      });
    }

    grid.appendChild(el);
  }

  if (!selectedKey) {
    document.getElementById('event-panel').classList.remove('open');
  }
}

function showEvents(y, m, d, evts) {
  const panel = document.getElementById('event-panel');
  const dateStr = MONTHS[m] + ' ' + d + ', ' + y;
  document.getElementById('event-date').textContent = dateStr;
  const list = document.getElementById('event-list');
  list.innerHTML = evts.map(e => {
    const color = CAT_COLORS[e.cat] || '#888';
    const label = e.cat === 'deadline' ? 'DEADLINE' : e.cat === 'biz' ? 'BIZ' : e.cat === 'personal' ? 'PERSONAL' : 'DONE';
    return '<div class="event-item">' +
      '<span class="event-tag" style="background:' + color + '">' + label + '</span>' +
      '<span class="event-text">' + e.text + '</span>' +
    '</div>';
  }).join('');
  panel.classList.add('open');
}

document.getElementById('prev-btn').addEventListener('click', () => {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  selectedKey = null;
  render();
});
document.getElementById('next-btn').addEventListener('click', () => {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  selectedKey = null;
  render();
});

render();
</script>
</body>
</html>
